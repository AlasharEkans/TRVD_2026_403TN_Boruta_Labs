<nav style="background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid red;">
  
  <a routerLink="/books" style="color: white; text-decoration: none; font-weight: bold; font-size: 20px;">
    📚 SMART LIBRARY
  </a>

  <div style="display: flex; gap: 20px; align-items: center;">
    
    <div *ngIf="authService.isLoggedIn$ | async; else guestButtons">
      <span style="margin-right: 15px;">
        Привіт, <b>{{ authService.getUserRole() }}</b>
      </span>
      <button (click)="logout()" style="background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">
        Вийти (Logout)
      </button>
    </div>

    <ng-template #guestButtons>
      <a routerLink="/login" style="color: #4db8ff; text-decoration: none;">Увійти</a>
      <a routerLink="/register" style="color: #4db8ff; text-decoration: none;">Реєстрація</a>
    </ng-template>

  </div>
</nav>

<div style="padding: 20px;">
  <router-outlet></router-outlet>
</div>
