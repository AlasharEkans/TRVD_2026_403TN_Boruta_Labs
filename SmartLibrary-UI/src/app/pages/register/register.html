<div style="max-width: 400px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px;">
  <h2>Реєстрація</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 10px;">
      <label>Email:</label><br>
      <input formControlName="email" type="email" style="width: 100%; padding: 8px;">
    </div>
    
    <div style="margin-bottom: 10px;">
      <label>Пароль (мін. 6 символів):</label><br>
      <input formControlName="password" type="password" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Роль:</label><br>
      <select formControlName="role" style="width: 100%; padding: 8px;">
        <option value="Reader">Читач (Reader)</option>
        <option value="Admin">Адміністратор (Admin)</option>
      </select>
    </div>

    <div *ngIf="errorMessage" style="color: red; margin-bottom: 10px;">{{ errorMessage }}</div>
    <div *ngIf="successMessage" style="color: green; margin-bottom: 10px;">{{ successMessage }}</div>

    <button type="submit" [disabled]="registerForm.invalid" style="width: 100%; padding: 10px;">Зареєструватися</button>
  </form>
  <p style="text-align: center; margin-top: 15px;">Вже є акаунт? <a routerLink="/login">Увійти</a></p>
</div>
